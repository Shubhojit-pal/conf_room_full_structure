version: "3.9"

# ──────────────────────────────────────────────────────────────────────────────
# CONFERENCE ROOM BOOKING SYSTEM - DOCKER COMPOSE
# ──────────────────────────────────────────────────────────────────────────────
# Services:
#   nginx          - Reverse proxy (exposed on port 80)
#   backend        - Express API server (port 5000, internal)
#   frontend-user  - Vite SPA via Nginx (port 80, internal)
#   frontend-admin - Next.js admin panel (port 3000, internal)
#
# Usage:
#   Development:  docker-compose up --build
#   Production:   docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ──────────────────────────────────────────────────────────────────────────────

services:
  # ── Nginx Reverse Proxy ─────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: crbs-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend-user:
        condition: service_healthy
      frontend-admin:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - crbs-network

  # ── Backend API ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: crbs-backend
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PORT: 5000
    ports:
      - "5000:5000"    # Exposed for direct API access during dev
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    restart: unless-stopped
    networks:
      - crbs-network

  # ── User Frontend ────────────────────────────────────────────────────────────
  frontend-user:
    build:
      context: ./frontend-user
      dockerfile: Dockerfile
      target: production
    container_name: crbs-frontend-user
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - crbs-network

  # ── Admin Frontend ───────────────────────────────────────────────────────────
  frontend-admin:
    build:
      context: ./frontend-admin
      dockerfile: Dockerfile
      target: production
    container_name: crbs-frontend-admin
    environment:
      NODE_ENV: production
      PORT: 3000
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    restart: unless-stopped
    networks:
      - crbs-network

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  uploads_data:
    driver: local

# ── Networks ─────────────────────────────────────────────────────────────────
networks:
  crbs-network:
    driver: bridge
