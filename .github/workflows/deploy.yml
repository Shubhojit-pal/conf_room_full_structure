name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # JOB 1: Lint & Build Validation
  # ────────────────────────────────────────────────────────────────────────────
  build:
    name: Build & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      # ── Backend ─────────────────────────────────────────────────────────────
      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      # ── User Frontend ────────────────────────────────────────────────────────
      - name: Install user frontend dependencies
        working-directory: ./frontend-user
        run: npm ci

      - name: Build user frontend
        working-directory: ./frontend-user
        run: npm run build

      # ── Admin Frontend ───────────────────────────────────────────────────────
      - name: Install admin frontend dependencies
        working-directory: ./frontend-admin
        run: npm ci --legacy-peer-deps

      - name: Build admin frontend
        working-directory: ./frontend-admin
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 2: Docker Build & Push (runs only on push to main)
  # ────────────────────────────────────────────────────────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/crbs-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/crbs-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push user frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend-user
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/crbs-frontend-user:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/crbs-frontend-user:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push admin frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend-admin
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/crbs-frontend-admin:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/crbs-frontend-admin:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 3: Deploy Admin Frontend to Vercel (on push to main)
  # ────────────────────────────────────────────────────────────────────────────
  deploy-admin:
    name: Deploy Admin → Vercel
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy admin to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_ADMIN_PROJECT_ID }}
          working-directory: ./frontend-admin
          vercel-args: "--prod"

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 4: Deploy User Frontend to Vercel (on push to main)
  # ────────────────────────────────────────────────────────────────────────────
  deploy-user:
    name: Deploy User → Vercel
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy user frontend to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_USER_PROJECT_ID }}
          working-directory: ./frontend-user
          vercel-args: "--prod"
